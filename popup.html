<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      font-family: -apple-system, system-ui, sans-serif;
      padding: 14px;
      background: #121212;
      color: #fff;
      margin: 0;
    }
    h1 { font-size: 14px; margin: 0 0 12px; color: #1db954; }
    h2 { font-size: 12px; margin: 14px 0 6px; color: #1db954; text-transform: uppercase; letter-spacing: .5px; }
    .opt {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px; border-radius: 8px; cursor: pointer;
      transition: background .15s; margin-bottom: 4px;
    }
    .opt:hover { background: #1f1f1f; }
    .opt input { margin-top: 2px; accent-color: #1db954; cursor: pointer; }
    .opt .label { font-size: 13px; font-weight: 600; }
    .opt .desc { font-size: 11px; color: #aaa; margin-top: 2px; line-height: 1.3; }
    .col { display: flex; flex-direction: column; }
    .shortcuts { padding: 0 4px; }
    .sc-row { display: flex; justify-content: space-between; font-size: 12px; margin: 4px 0; }
    .sc-row .name { color: #ccc; }
    .sc-row .key { color: #1db954; font-family: monospace; }
    .sc-row .key.unset { color: #777; font-style: italic; }
    button.customize {
      width: 100%; margin-top: 10px;
      background: #1db954; color: #000; font-weight: 600;
      border: none; border-radius: 8px; padding: 8px; cursor: pointer;
      font-size: 12px;
    }
    button.customize:hover { background: #1ed760; }
    .hint { font-size: 10px; color: #777; margin-top: 8px; line-height: 1.3; }
  </style>
</head>
<body>
  <h1>Spotify Auto-Pause</h1>

  <label class="opt">
    <input type="radio" name="mode" value="off">
    <div class="col">
      <span class="label">Disattivato</span>
      <span class="desc">Non fa nulla. Spotify gira normalmente.</span>
    </div>
  </label>

  <label class="opt">
    <input type="radio" name="mode" value="auto">
    <div class="col">
      <span class="label">Blocco automatico</span>
      <span class="desc">Mette pausa subito dopo ogni pubblicita', senza chiedere.</span>
    </div>
  </label>

  <label class="opt">
    <input type="radio" name="mode" value="prompt">
    <div class="col">
      <span class="label">Blocco con popup</span>
      <span class="desc">Ad ogni pub mostra una notifica con Si'/No.</span>
    </div>
  </label>

  <h2>Scorciatoie</h2>
  <div class="shortcuts" id="shortcuts"></div>

  <button class="customize" id="customize">Personalizza scorciatoie</button>
  <div class="hint">Si apre la pagina di Chrome dove puoi assegnare qualsiasi combinazione (Alt+P, Ctrl+Shift+Y, ecc.). Le scorciatoie funzionano con Chrome in primo piano e una tab di Spotify aperta.</div>

  <script src="popup.js"></script>
</body>
</html>
